{% extends "base.html" %}

{% block nav_create_class %}active{% endblock %}

{% block content %}
<section class="card">
    <h2>Class Information</h2>
    <form class="form-grid">
        <div>
            <label>Class Name</label>
            <input type="text" placeholder="Morning Yoga">
        </div>
        <div>
            <label>Type</label>
            <select><option>Select type</option></select>
        </div>
        <div>
            <label>Max Capacity</label>
            <input type="text" value="25">
        </div>
        <div>
            <label>Duration (min)</label>
            <input type="text" value="60">
        </div>
    </form>
</section>

<section class="card">
    <h2>Schedule</h2>
    <form class="form-grid">
        <div>
            <label>Day of Week</label>
            <select><option>Day</option></select>
        </div>
        <div>
            <label>Start Time</label>
            <input type="text" placeholder="--:--">
        </div>
        <div>
            <label>End Time</label>
            <input type="text" placeholder="--:--">
        </div>
        <div class="full-width">
            <label>Room</label>
            <select><option>Select room</option></select>
        </div>
        <div class="full-width">
            <p class="helper-text"><span class="dot"></span> Room available for selected time slot</p>
        </div>
        <div class="full-width">
            <button type="button" class="btn primary">Create Class</button>
        </div>
    </form>
</section>
{% endblock %}
