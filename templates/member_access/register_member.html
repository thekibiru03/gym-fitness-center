{% extends "base.html" %}

{% block nav_register %}active{% endblock %}

{% block content %}
<section class="card">
    <h2>Personal Details</h2>
    <form class="form-grid">
        <div>
            <label>First Name</label>
            <input type="text" placeholder="John">
        </div>
        <div>
            <label>Last Name</label>
            <input type="text" placeholder="Doe">
        </div>
        <div class="full-width">
            <label>Email</label>
            <input type="email" placeholder="john@example.com">
        </div>
        <div>
            <label>Phone</label>
            <input type="text" placeholder="(555) 123-4567">
        </div>
        <div>
            <label>Date of Birth</label>
            <input type="text" placeholder="dd/mm/yyyy">
        </div>
        <div class="full-width">
            <label>Address</label>
            <input type="text" placeholder="123 Main St, City, State">
        </div>
        <div class="full-width">
            <label>Membership Tier</label>
            <div class="pill-group">
                <span class="pill">Basic</span>
                <span class="pill active">Premium</span>
                <span class="pill">VIP</span>
            </div>
        </div>
        <div class="actions full-width">
            <button type="button" class="btn primary">Register Member</button>
            <button type="button" class="btn">Cancel</button>
        </div>
    </form>
</section>
{% endblock %}
